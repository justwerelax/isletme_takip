<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Alt Firma Takip</title>
    <link rel="stylesheet" href="../css/app.css">
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .login-logo h1 { font-size: 24px; color: #1f2937; margin-bottom: 6px; }
        .login-logo p  { font-size: 14px; color: #6b7280; }
        .error-box {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #ef4444;
            display: none;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px;
            border: 2px solid #e5e7eb; border-radius: 8px;
            font-size: 15px; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            font-family: inherit; margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-login:hover:not(:disabled) { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <span class="icon">🧹</span>
            <h1>Alt Firma Takip</h1>
            <p>Halı yıkama alt firma yönetim sistemi</p>
        </div>

        <div id="errorBox" class="error-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" autocomplete="username" placeholder="Kullanıcı adınızı girin" required>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="Şifrenizi girin" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">Giriş Yap</button>
        </form>
    </div>

    <script>
        // Zaten giriş yapılmışsa role göre yönlendir
        if (Auth.isAuthenticated()) {
            const u = Auth.getUser();
            if (u && u.rol === 'firma' && u.alt_firma_id) {
                window.location.replace('subcontractor.html?id=' + u.alt_firma_id + '&v=' + Date.now());
            } else {
                window.location.replace('dashboard.html?v=' + Date.now());
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Giriş yapılıyor...';

            try {
                const result = await Auth.login(username, password);
                if (result.success) {
                    const user = Auth.getUser();
                    if (user && user.rol === 'firma' && user.alt_firma_id) {
                        window.location.replace('subcontractor.html?id=' + user.alt_firma_id + '&v=' + Date.now());
                    } else {
                        window.location.replace('dashboard.html?v=' + Date.now());
                    }
                } else {
                    errorBox.textContent = result.error || 'Kullanıcı adı veya şifre hatalı';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Giriş Yap';
                }
            } catch (err) {
                errorBox.textContent = 'Bağlantı hatası. Lütfen tekrar deneyin.';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Giriş Yap';
            }
        });
    </script>
</body>
</html>
